<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes"
    />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="description" content="Authorization System" />
    <title>Engineer Monitoring</title>

    <link rel="preconnect" href="https://www.carlstahl.com" />
    <link rel="preconnect" href="https://script.google.com" />
    <link
      rel="icon"
      type="image/x-icon"
      href="https://www.carlstahl.com/images/favicon.ico"
    />
    <link
      rel="apple-touch-icon"
      href="https://www.carlstahl.com/images/favicon.ico"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        zoom: 0.95;
        width: 105.26vw;
        height: 105.26vh;
        overflow: hidden;
        background: #f5f5f5;
      }

      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        background: #f5f5f5;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
        overscroll-behavior: none;
        touch-action: pan-x pan-y;
      }

      .iframe-container {
        flex: 1;
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: none;
        display: block;
      }

      /* Loading indicator */
      .loading {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        color: #666;
        z-index: 5;
        pointer-events: none;
      }

      .loading-spinner {
        border: 3px solid #f3f3f3;
        border-top: 3px solid #3498db;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin: 0 auto 10px;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      .iframe-loaded .loading {
        display: none;
      }

      @media screen and (max-width: 768px) {
        html {
          width: 105.26vw;
          height: 105.26vh;
        }
        body {
          position: fixed;
          width: 100%;
          height: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="iframe-container" id="iframeContainer">
      <div class="loading" id="loadingEl">
        <div class="loading-spinner"></div>
        <p>Loading System...</p>
      </div>

      <iframe
        id="mainFrame"
        src="https://script.google.com/macros/s/AKfycbzzQh3C2LhzB-f4NLm_zT3UEzkyNO4oee4pw9LFeoTS2yJd7u7g_EqPmDDU5HIZkYbA/exec"
        loading="eager"
        allow="camera; microphone; geolocation"
        title="Engineer Monitoring and Authorization System"
      >
        <p>
          Your browser doesn't support iframes. Please
          <a
            href="https://script.google.com/macros/s/AKfycbzzQh3C2LhzB-f4NLm_zT3UEzkyNO4oee4pw9LFeoTS2yJd7u7g_EqPmDDU5HIZkYbA/exec"
          >
            click here
          </a>
          to access the form.
        </p>
      </iframe>
    </div>

    <script>
      (function () {
        "use strict";

        const iframe = document.getElementById("mainFrame");
        const loading = document.getElementById("loadingEl");

        // Hide loader when iframe loads
        iframe.addEventListener("load", function () {
          loading.style.display = "none";
        });

        // Orientation change — force repaint
        window.addEventListener("orientationchange", function () {
          setTimeout(function () {
            iframe.style.height = "99.9%";
            setTimeout(function () {
              iframe.style.height = "100%";
            }, 80);
          }, 150);
        });

        // Prevent double-tap zoom on iOS
        let lastTouchEnd = 0;
        document.addEventListener(
          "touchend",
          function (e) {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) e.preventDefault();
            lastTouchEnd = now;
          },
          { passive: false },
        );
      })();
    </script>
  </body>
</html>
